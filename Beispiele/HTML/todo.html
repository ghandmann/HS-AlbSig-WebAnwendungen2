<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Todo App</title>

    <link rel="stylesheet" href="https://bootswatch.com/5/solar/bootstrap.min.css">

    <style>
        li {
            cursor: pointer;
            color: blue;
        }

        li:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Todo App!</h1>

        <div class="input-group mb-3">
            <input id="new-todo-title" type="text" class="form-control" placeholder="Recipient’s username" aria-label="Recipient’s username"
                aria-describedby="basic-addon2">
            <button type="button" class="btn btn-outline-success" id="add-todo-button">Todo
            hinzufügen</button>
        </div>

        <ul id="todo-list" class="list-group">
        </ul>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", init);

        function init() {
            const addButton = document.querySelector("#add-todo-button");
            addButton.addEventListener("click", addTodoButtonClicked);

            const inputTitle = document.querySelector("#new-todo-title");
            inputTitle.addEventListener("keydown", (e) => {
                if (e.key === 'Enter') {
                    addTodoButtonClicked();
                }
            });
        }

        function addTodoButtonClicked() {
            const titleInput = document.querySelector("#new-todo-title");
            const title = titleInput.value;

            if (title === "") {
                return;
            }

            const newTodoItem = document.createElement("li");
            newTodoItem.innerText = title;
            newTodoItem.addEventListener("click", () => newTodoItem.remove());
            newTodoItem.classList.add("list-group-item");

            const todoList = document.querySelector("#todo-list");
            todoList.appendChild(newTodoItem);

            titleInput.value = "";
        }
    </script>
</body>

</html>
